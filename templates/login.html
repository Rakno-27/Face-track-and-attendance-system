<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceTrack | Secure Authentication</title>
    <style>
        :root {
            --bg: #0f1115;
            --surface: #1a1d24;
            --text1: #ffffff;
            --text2: #a0a5b1;
            --border: #2a2e39;
            --primary: #10b981;
            --primary-hover: #059669;
            --red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text1);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text1);
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text2);
            font-size: 0.875rem;
        }

        .alert {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--red);
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text2);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text1);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h1>FaceTrack Security</h1>
            <p>Authentication Required</p>
        </div>

        {% if error %}
        <div class="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
            <div class="form-group">
                <label for="username">Administrator ID</label>
                <input type="text" id="username" name="username" placeholder="Enter your username..." required autocomplete="username" autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Encrypted Passphrase</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit">Verify Credentials</button>
        </form>
    </div>

</body>
</html>
